name: 🎮 Sky Royale APK Builder

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: APK Derle
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Kodu indir
        uses: actions/checkout@v4

      - name: ☕ Java 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🔧 Gradle kur
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: 📦 Bağımlılık cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 🔨 Debug APK Derle
        run: gradle assembleDebug

      - name: 🚀 Release APK Derle
        run: gradle assembleRelease

      - name: 📤 Debug APK yükle
        uses: actions/upload-artifact@v4
        with:
          name: SkyRoyale-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: 📤 Release APK yükle
        uses: actions/upload-artifact@v4
        with:
          name: SkyRoyale-Release-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: 📊 Sonuç
        run: |
          echo "✅ APK derlendi!"
          find app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;
